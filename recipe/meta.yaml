{% set name = "ipython" %}
{% set version = "9.11.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 2a94bc4406b22ecc7e4cb95b98450f3ea493a76bec8896cda11b78d7752a6667

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<312]
  entry_points:
    - ipython = IPython:start_ipython
    - ipython3 = IPython:start_ipython

requirements:
  host:
    - pip
    - python
    - setuptools >=80.0
  run:
    - python
    - colorama >=0.4.4  # [win]
    - decorator >=5.1.0
    - ipython_pygments_lexers >=1.0.0
    - jedi >=0.18.2
    - matplotlib-inline >=0.1.6
    - pexpect >4.6  # [not win]
    - prompt_toolkit >=3.0.41,<3.1.0
    - pygments >=2.14.0
    - stack_data >=0.6.0
    - traitlets >=0.6.0
  run_constrained:
    - argcomplete >=3.0

{% set test_ignore = "" %}

# test_hist_file_config can fail randomly on osx-arm64 on CI
{% set test_ignore = test_ignore + " --deselect=tests/test_history.py::test_hist_file_config" %}  # [osx]
# skip due to path shortening of build directory against to home path '~' on Windows CI.
{% set test_ignore = test_ignore + " --deselect=tests/test_oinspect.py::test_info" %}  # [win]

test:
  source_files:
    - tests
  requires:
    - pip
    - packaging >=23.0.0
    - pytest >=7.0.0
    - pytest-asyncio >=1.0.0
    - setuptools >=80
    - testpath >=0.2
    # [Optional] Use test extras (this doesn't add much to the build times)
    - curio
    - ipykernel >6.30
    - matplotlib-base >3.9.0
    - nbclient
    - nbformat
    - numpy >=2
    - pandas >2.1
    - trio >=0.22.0
  commands:
    - pip check
    - pygmentize -L | grep ipython  # [unix]
    - ipython -h
    - ipython3 -h
    - export MIGRATING=false  # [unix]
    - pytest tests {{ test_ignore }}

about:
  home: https://ipython.org
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: "IPython: Productive Interactive Computing"
  description: |
    IPython provides a rich architecture for interactive computing with
    a powerful interactive shell, a kernel for Jupyter, high performance
    tools for parallel computing, and more.
  doc_url: https://ipython.readthedocs.io
  dev_url: https://github.com/ipython/ipython

extra:
  recipe-maintainers:
    - Carreau
    - jakirkham
    - fperez
    - ellisonbg
    - minrk
    - ocefpaf
    - pelson
    - takluyver
    - bollwyvl
    - blink1073
